<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="matchaxmoxie setting sun chalkboard">
  <rect width="32" height="32" fill="#FFF0E0"/>
  <rect x="2" y="2" width="28" height="28" fill="none" stroke="#5C4B7A" stroke-width="2"/>
  <!-- chalkboard -->
  <rect x="5" y="16" width="22" height="11" fill="#3A3350"/>
  <rect x="7" y="18" width="18" height="2" fill="#F8EDE0"/>
  <rect x="7" y="22" width="12" height="2" fill="#F8EDE0"/>
  <!-- setting sun (paper-cut half) -->
  <polygon points="16,8 22,16 10,16" fill="#F4A261"/>
  <rect x="10" y="16" width="12" height="3" fill="#E76F51"/>
  <!-- chalk ray stubs -->
  <rect x="15" y="5" width="2" height="3" fill="#F4A261"/>
  <rect x="22" y="9" width="3" height="2" fill="#9B8EC4"/>
  <rect x="7" y="9" width="3" height="2" fill="#9B8EC4"/>
</svg>
